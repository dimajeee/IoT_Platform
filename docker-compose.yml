services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iot
      POSTGRES_USER: iot
      POSTGRES_PASSWORD: iot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot -d iot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: build/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      BACKEND_HTTP_ADDR: ":8080"
      BACKEND_MQTT_HOST: "${MQTT_HOST:?set MQTT_HOST in .env}"
      BACKEND_MQTT_PORT: "${MQTT_PORT:?set MQTT_PORT in .env}"
      BACKEND_MQTT_USERNAME: "${MQTT_USERNAME:?set MQTT_USERNAME in .env}"
      BACKEND_MQTT_PASSWORD: "${MQTT_PASSWORD:?set MQTT_PASSWORD in .env}"
      BACKEND_MQTT_CLIENT_ID: "backend-service"
      BACKEND_MQTT_TOPIC: "${MQTT_TOPIC:-/esp32/+/+}"
      BACKEND_MQTT_DECODER: "${MQTT_DECODER:-esp32-topic-value}"
      BACKEND_MQTT_SENSOR_ID_TOPIC_POS: "${MQTT_SENSOR_ID_TOPIC_POS:--1}"
      BACKEND_MQTT_COMMAND_TOPIC: "${MQTT_COMMAND_TOPIC:-/esp32/interval}"
      BACKEND_POSTGRES_DSN: "postgres://iot:iot@postgres:5432/iot?sslmode=disable"
      BACKEND_REDIS_ADDR: "redis:6379"
      BACKEND_REDIS_PASSWORD: ""
      BACKEND_REDIS_DB: "0"
      BACKEND_LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    profiles:
      - simulator
    build:
      context: .
      dockerfile: build/gateway/Dockerfile
    environment:
      GATEWAY_MQTT_HOST: "${MQTT_HOST:?set MQTT_HOST in .env}"
      GATEWAY_MQTT_PORT: "${MQTT_PORT:?set MQTT_PORT in .env}"
      GATEWAY_MQTT_USERNAME: "${MQTT_USERNAME:?set MQTT_USERNAME in .env}"
      GATEWAY_MQTT_PASSWORD: "${MQTT_PASSWORD:?set MQTT_PASSWORD in .env}"
      GATEWAY_MQTT_CLIENT_ID: "gateway-service"
      GATEWAY_PUBLISH_INTERVAL: "5s"
      GATEWAY_LOG_LEVEL: "info"

  hardware-gateway:
    profiles:
      - hardware
    build:
      context: .
      dockerfile: build/hardware-gateway/Dockerfile
    environment:
      HARDWARE_GATEWAY_MQTT_HOST: "${MQTT_HOST:?set MQTT_HOST in .env}"
      HARDWARE_GATEWAY_MQTT_PORT: "${MQTT_PORT:?set MQTT_PORT in .env}"
      HARDWARE_GATEWAY_MQTT_USERNAME: "${MQTT_USERNAME:?set MQTT_USERNAME in .env}"
      HARDWARE_GATEWAY_MQTT_PASSWORD: "${MQTT_PASSWORD:?set MQTT_PASSWORD in .env}"
      HARDWARE_GATEWAY_MQTT_CLIENT_ID: "hardware-gateway-service"
      HARDWARE_GATEWAY_SERIAL_PORT: "${HARDWARE_SERIAL_PORT:-/dev/ttyUSB0}"
      HARDWARE_GATEWAY_SERIAL_BAUD: "${HARDWARE_SERIAL_BAUD:-115200}"
      HARDWARE_GATEWAY_LOG_LEVEL: "info"
    devices:
      - "${HARDWARE_SERIAL_PORT:-/dev/ttyUSB0}:${HARDWARE_SERIAL_PORT:-/dev/ttyUSB0}"

volumes:
  postgres_data:
